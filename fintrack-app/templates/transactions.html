{% extends "base.html" %}

{% block title %}Transactions - FinTrack{% endblock %}

{% block content %}
<div id="toastContainer" class="notification-toast-container" aria-live="polite" aria-atomic="true"></div>

<div class="row">
    <div class="col-md-12">
        <h2 class="mb-4"><i class="fas fa-exchange-alt"></i> Transactions</h2>
    </div>
</div>

<!-- Add Transaction Form -->
<div class="row mb-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h6 class="mb-0"><i class="fas fa-plus"></i> Add New Transaction</h6>
            </div>
            <div class="card-body">
                <form id="transactionForm">
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" required placeholder="e.g., Grocery shopping">
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="amount" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" required>
                            <option value="">Select or create a category</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">Type</label>
                        <select class="form-select" id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-save"></i> Add Transaction
                    </button>
                </form>
            </div>
        </div>

        <!-- Category Management -->
        <div class="card mt-4">
            <div class="card-header bg-info text-white">
                <h6 class="mb-0"><i class="fas fa-tags"></i> Manage Categories</h6>
            </div>
            <div class="card-body">
                <form id="categoryForm">
                    <div class="mb-3">
                        <label for="catName" class="form-label">Category Name</label>
                        <input type="text" class="form-control" id="catName" required placeholder="e.g., Groceries">
                    </div>
                    <div class="mb-3">
                        <label for="catColor" class="form-label">Color</label>
                        <input type="color" class="form-control form-control-color" id="catColor" value="#3498db">
                    </div>
                    <button type="submit" class="btn btn-info w-100">
                        <i class="fas fa-plus"></i> Create Category
                    </button>
                </form>
                <div id="categoriesList" class="mt-3"></div>
            </div>
        </div>
    </div>

    <!-- Transactions List -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h6 class="mb-0"><i class="fas fa-list"></i> All Transactions</h6>
            </div>
            <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                <div id="transactionsList"></div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// Set today's date as default
document.getElementById('date').valueAsDate = new Date();

document.addEventListener('DOMContentLoaded', function() {
    loadCategories();
    loadTransactions();
});

document.getElementById('transactionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const transaction = {
        description: document.getElementById('description').value,
        amount: parseFloat(document.getElementById('amount').value),
        category_id: parseInt(document.getElementById('category').value),
        transaction_type: document.getElementById('type').value,
        date: document.getElementById('date').value
    };

    try {
        const response = await fetch('/api/transactions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(transaction)
        });

        if (response.ok) {
            document.getElementById('transactionForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            loadTransactions();
            alert('Transaction added successfully!');
        } else {
            alert('Error adding transaction');
        }
    } catch (error) {
        console.error('Error:', error);
    }
});

document.getElementById('categoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const category = {
        name: document.getElementById('catName').value,
        color: document.getElementById('catColor').value,
        icon: 'tag'
    };

    try {
        const response = await fetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(category)
        });

        if (response.ok) {
            document.getElementById('categoryForm').reset();
            loadCategories();
            showTopNotification('Category created successfully.', 'success');
        } else {
            const errorData = await response.json().catch(() => null);
            showTopNotification(errorData?.error || 'Error creating category.', 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showTopNotification('Unable to create category right now.', 'error');
    }
});

async function loadCategories() {
    try {
        const response = await fetch('/api/categories');
        const categories = await response.json();
        
        const select = document.getElementById('category');
        select.innerHTML = '<option value="">Select a category</option>';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.textContent = cat.name;
            select.appendChild(option);
        });

        const list = document.getElementById('categoriesList');
        list.innerHTML = categories.map(cat => `
            <div class="badge" style="background-color: ${cat.color}; margin: 5px;">
                ${cat.name}
                <button class="btn btn-sm" onclick="deleteCategory(${cat.id})" style="background: none; border: none; color: white; cursor: pointer;">×</button>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading categories:', error);
    }
}

async function deleteCategory(id) {
    try {
        const response = await fetch(`/api/categories/${id}`, { method: 'DELETE' });
        if (response.ok) {
            loadCategories();
            showTopNotification('Category deleted successfully.', 'success');
        } else {
            const errorData = await response.json().catch(() => null);
            showTopNotification(errorData?.error || 'Error deleting category.', 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showTopNotification('Unable to delete category right now.', 'error');
    }
}

function showTopNotification(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `notification-toast notification-${type}`;
    toast.textContent = message;

    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));

    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

async function loadTransactions() {
    try {
        const response = await fetch('/api/transactions');
        const transactions = await response.json();
        
        const list = document.getElementById('transactionsList');
        if (transactions.length === 0) {
            list.innerHTML = '<p class="text-muted">No transactions yet</p>';
            return;
        }

        list.innerHTML = transactions.map(tx => `
            <div class="card mb-2">
                <div class="card-body py-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${tx.description}</h6>
                            <small class="text-muted">${new Date(tx.date).toLocaleDateString()} • ${tx.category_name}</small>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold ${tx.transaction_type === 'income' ? 'text-success' : 'text-danger'}">
                                ${tx.transaction_type === 'income' ? '+' : '-'}$${tx.amount.toFixed(2)}
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteTransaction(${tx.id})">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading transactions:', error);
    }
}

async function deleteTransaction(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
        await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
        loadTransactions();
    } catch (error) {
        console.error('Error:', error);
    }
}
</script>
{% endblock %}
