<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Total Income</h6>
                    <h3 class="stat-card-amount" id="total-income">$0.00</h3>
                </div>
                <i class="fas fa-arrow-up stat-card-icon"></i>
            </div>
        </div>
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Total Expense</h6>
                    <h3 class="stat-card-amount" id="total-expense">$0.00</h3>
                </div>
                <i class="fas fa-arrow-down stat-card-icon"></i>
            </div>
        </div>
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Balance</h6>
                    <h3 class="stat-card-amount" id="balance">$0.00</h3>
                </div>
                <i class="fas fa-wallet stat-card-icon"></i>
            </div>
        </div>
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Savings Rate</h6>
                    <h3 class="stat-card-amount" id="savings-rate">0.00%</h3>
                </div>
                <i class="fas fa-piggy-bank stat-card-icon"></i>
            </div>
        </div>
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Assets Value</h6>
                    <h3 class="stat-card-amount" id="total-assets">$0.00</h3>
                </div>
                <i class="fas fa-chart-line stat-card-icon"></i>
            </div>
        </div>
        <div class="col-md-2 mb-3">
            <div class="card stat-card">
                <div class="card-body">
                    <h6 class="card-title">Net Worth</h6>
                    <h3 class="stat-card-amount" id="net-worth">$0.00</h3>
                </div>
                <i class="fas fa-calculator stat-card-icon"></i>
            </div>
        </div>
    </div>

    <div class="row mb-4">
       <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="fas fa-pie-chart"></i> Expense by Category</h6>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-light active" id="categoryPieBtn" onclick="switchCategoryChart('pie')" title="Pie Chart">
                            <i class="fas fa-chart-pie"></i>
                        </button>
                        <button type="button" class="btn btn-outline-light" id="categoryBarBtn" onclick="switchCategoryChart('bar')" title="Bar Chart">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body">
                   <div class="row" style="height: 380px; display: flex; align-items: center;">
                       <div class="col-md-5" id="categoryLegendContainer">
                           <div id="categoryLegend"></div>
                       </div>
                       <div class="col-md-7" style="display: flex; align-items: center; justify-content: center;">
                           <div style="width: 100%; height: 300px; position: relative;">
                               <canvas id="categoryChart"></canvas>
                           </div>
                       </div>
                   </div>
               </div>
           </div>
       </div>
       <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="fas fa-line-chart"></i> Monthly Trend</h6>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-light active" id="monthlyLineBtn" onclick="switchMonthlyChart('line')" title="Line Chart">
                            <i class="fas fa-line-chart"></i>
                        </button>
                        <button type="button" class="btn btn-outline-light" id="monthlyBarBtn" onclick="switchMonthlyChart('bar')" title="Bar Chart">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body" style="height: 420px; display: flex; align-items: center; justify-content: center;">
                    <div style="width: 100%; height: 300px; position: relative;">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card tx-card">
                <div class="card-header tx-card-header">
                    <div class="d-flex align-items-center gap-2">
                        <div class="tx-header-icon">
                            <i class="fas fa-receipt"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 tx-header-title">Recent Transactions</h6>
                            <span class="tx-header-sub" id="tx-total-count"></span>
                        </div>
                    </div>
                    <div class="tx-header-actions">
                        <a href="/transactions" class="btn btn-sm tx-view-all-btn">
                            <i class="fas fa-external-link-alt"></i> View All
                        </a>
                    </div>
                </div>
                <div class="card-body p-0">
                    <!-- Column Labels -->
                    <div class="tx-col-labels">
                        <span class="tx-col-date"><i class="fas fa-calendar-alt"></i> Date</span>
                        <span class="tx-col-desc"><i class="fas fa-align-left"></i> Description</span>
                        <span class="tx-col-cat"><i class="fas fa-tag"></i> Category</span>
                        <span class="tx-col-type"><i class="fas fa-exchange-alt"></i> Type</span>
                        <span class="tx-col-amount"><i class="fas fa-coins"></i> Amount</span>
                        <span class="tx-col-action"></span>
                    </div>
                    <div id="recent-tx-body"></div>
                </div>
                <!-- Pagination -->
                <div class="tx-pagination">
                    <span class="tx-page-info" id="tx-page-info"></span>
                    <div class="tx-page-controls">
                        <button class="tx-page-btn" id="tx-first-btn" onclick="goToFirstPage()" title="First page">
                            <i class="fas fa-angle-double-left"></i>
                        </button>
                        <button class="tx-page-btn" id="tx-prev-btn" onclick="previousTransactionPage()" title="Previous">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="tx-page-numbers" id="tx-page-numbers"></span>
                        <button class="tx-page-btn" id="tx-next-btn" onclick="nextTransactionPage()" title="Next">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                        <button class="tx-page-btn" id="tx-last-btn" onclick="goToLastPage()" title="Last page">
                            <i class="fas fa-angle-double-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- User Profile Modal -->
<div class="modal fade" id="userProfileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user"></i> User Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-4">
                    <div class="position-relative d-inline-block">
                        <img src="https://via.placeholder.com/120" id="profilePicture" class="rounded-circle border" style="width: 120px; height: 120px; object-fit: cover;">
                        <button type="button" class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" title="Change Picture" style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-camera"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control" id="userName" value="User Name" placeholder="Enter your full name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" id="userEmail" value="user@example.com" placeholder="Enter your email" disabled>
                </div>
                <hr>
                <h6 class="fw-bold mb-3"><i class="fas fa-lock"></i> Change Password</h6>
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control" placeholder="Enter current password">
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" placeholder="Enter new password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm new password">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes (Coming Soon)
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-5 py-3 bg-light text-center">
    <div class="container">
        <span class="text-muted">© 2024 FinTrack - Personal Financial Tracker</span>
    </div>
</footer>

<script>
    let allTransactions = [];
    let currentPage = 0;
    const pageSize = 5;
    let categoryChartData = [];
    let monthlyChartData = [];
    let categoryChartType = 'pie';
    let monthlyChartType = 'line';
    let categoryChartInstance = null;
    let monthlyChartInstance = null;
    let categoryColorMap = {};

    /** Shrink .stat-card-amount font until text fits on one line */
    function fitStatAmounts() {
        document.querySelectorAll('.stat-card-amount').forEach(function (el) {
            // Reset to CSS-defined size first
            el.style.fontSize = '';
            const cardBody = el.closest('.card-body');
            if (!cardBody) return;
            // Available width = card body minus icon space (right side)
            const maxW = cardBody.clientWidth - 48;
            let fs = parseFloat(window.getComputedStyle(el).fontSize);
            let safety = 0;
            while (el.scrollWidth > maxW && fs > 12 && safety++ < 25) {
                fs -= 1;
                el.style.fontSize = fs + 'px';
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadDashboard();
    });

    // Re-fit on window resize
    window.addEventListener('resize', fitStatAmounts);

    async function loadDashboard() {
        try {
            const summary = await fetch('/api/analytics/summary').then(r => r.json());
            document.getElementById('total-income').textContent = '$' + Number(summary.total_income).toFixed(2);
            document.getElementById('total-expense').textContent = '$' + Number(summary.total_expense).toFixed(2);
            document.getElementById('balance').textContent = '$' + Number(summary.balance).toFixed(2);
            document.getElementById('savings-rate').textContent = Number(summary.savings_rate || 0).toFixed(2) + '%';
            document.getElementById('total-assets').textContent = '$' + Number(summary.total_assets || 0).toFixed(2);
            document.getElementById('net-worth').textContent = '$' + Number(summary.net_worth || 0).toFixed(2);

            // Shrink font to fit single line after content is set
            fitStatAmounts();

            // Fetch categories and build color map
            const categories = await fetch('/api/categories').then(r => r.json());
            categoryColorMap = {};
            categories.forEach(cat => {
                categoryColorMap[cat.name] = cat.color || '#6c757d';
            });

            const breakdown = await fetch('/api/analytics/category-breakdown').then(r => r.json());
            categoryChartData = breakdown;
            drawCategoryChart(breakdown);

            const monthly = await fetch('/api/analytics/monthly').then(r => r.json());
            monthlyChartData = monthly;
            drawMonthlyChart(monthly);

            const transactions = await fetch('/api/transactions?limit=1000').then(r => r.json());
            allTransactions = transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            currentPage = 0;
            displayTransactionPage();
        } catch (error) {
            console.error('Error loading dashboard:', error);
        }
    }

    function displayTransactionPage() {
        const start = currentPage * pageSize;
        const end = start + pageSize;
        const pageTransactions = allTransactions.slice(start, end);
        const totalPages = Math.ceil(allTransactions.length / pageSize);

        // Map transaction type to icon
        const typeIcon = { income: 'fa-arrow-up', expense: 'fa-arrow-down' };
        const txTypeIcon = (type) => `<i class="fas ${typeIcon[type] || 'fa-circle'}"></i>`;

        // Category icon guessing based on common names
        function getCatIcon(name) {
            if (!name) return 'fa-tag';
            const n = name.toLowerCase();
            if (n.includes('food') || n.includes('restaurant') || n.includes('eat')) return 'fa-utensils';
            if (n.includes('transport') || n.includes('car') || n.includes('fuel') || n.includes('gas')) return 'fa-car';
            if (n.includes('shop') || n.includes('cloth') || n.includes('fashion')) return 'fa-shopping-bag';
            if (n.includes('health') || n.includes('medical') || n.includes('doctor')) return 'fa-heartbeat';
            if (n.includes('entertain') || n.includes('movie') || n.includes('game')) return 'fa-film';
            if (n.includes('salary') || n.includes('income') || n.includes('wage')) return 'fa-briefcase';
            if (n.includes('rent') || n.includes('house') || n.includes('home')) return 'fa-home';
            if (n.includes('edu') || n.includes('school') || n.includes('book')) return 'fa-graduation-cap';
            if (n.includes('invest') || n.includes('stock') || n.includes('dividend')) return 'fa-chart-line';
            if (n.includes('travel') || n.includes('hotel') || n.includes('flight')) return 'fa-plane';
            if (n.includes('phone') || n.includes('mobile') || n.includes('internet')) return 'fa-mobile-alt';
            if (n.includes('electric') || n.includes('bill') || n.includes('utility')) return 'fa-bolt';
            return 'fa-tag';
        }

        const container = document.getElementById('recent-tx-body');

        if (pageTransactions.length === 0) {
            container.innerHTML = `
                <div class="tx-empty">
                    <i class="fas fa-inbox"></i>
                    <p>No transactions yet</p>
                    <a href="/transactions" class="btn btn-sm btn-primary mt-2"><i class="fas fa-plus"></i> Add Transaction</a>
                </div>`;
        } else {
            container.innerHTML = pageTransactions.map((tx, idx) => {
                const catColor = categoryColorMap[tx.category_name] || '#6c757d';
                const isIncome = tx.transaction_type === 'income';
                const dateObj = new Date(tx.date);
                const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const yearStr = dateObj.getFullYear();
                const catIcon = getCatIcon(tx.category_name);
                return `
                <div class="tx-row" style="animation-delay: ${idx * 40}ms">
                    <div class="tx-col-date">
                        <div class="tx-date-badge">
                            <span class="tx-date-day">${dayName}</span>
                            <span class="tx-date-date">${dateStr}</span>
                            <span class="tx-date-year">${yearStr}</span>
                        </div>
                    </div>
                    <div class="tx-col-desc">
                        <div class="tx-type-dot ${isIncome ? 'dot-income' : 'dot-expense'}">
                            ${txTypeIcon(tx.transaction_type)}
                        </div>
                        <div class="tx-desc-text">
                            <span class="tx-desc-main">${tx.description}</span>
                        </div>
                    </div>
                    <div class="tx-col-cat">
                        <span class="tx-category-chip" style="--cat-color: ${catColor}">
                            <i class="fas ${catIcon}"></i>
                            ${tx.category_name || 'Uncategorized'}
                        </span>
                    </div>
                    <div class="tx-col-type">
                        <span class="tx-type-badge ${isIncome ? 'type-income' : 'type-expense'}">
                            ${txTypeIcon(tx.transaction_type)}
                            ${tx.transaction_type.charAt(0).toUpperCase() + tx.transaction_type.slice(1)}
                        </span>
                    </div>
                    <div class="tx-col-amount">
                        <span class="tx-amount ${isIncome ? 'amount-income' : 'amount-expense'}">
                            ${isIncome ? '+' : '−'}$${Number(tx.amount).toFixed(2)}
                        </span>
                    </div>
                    <div class="tx-col-action">
                        <button class="tx-delete-btn" onclick="deleteTransaction(${tx.id})" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // Page info
        const shown = Math.min(end, allTransactions.length);
        document.getElementById('tx-page-info').innerHTML =
            `<i class="fas fa-list-ul"></i> Showing <strong>${start + 1}–${shown}</strong> of <strong>${allTransactions.length}</strong>`;
        document.getElementById('tx-total-count').textContent =
            allTransactions.length + ' transaction' + (allTransactions.length !== 1 ? 's' : '');

        // Page number buttons
        const numbersEl = document.getElementById('tx-page-numbers');
        let nums = '';
        const range = 2;
        for (let i = 0; i < totalPages; i++) {
            if (i === 0 || i === totalPages - 1 || (i >= currentPage - range && i <= currentPage + range)) {
                nums += `<button class="tx-page-num ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i + 1}</button>`;
            } else if (i === currentPage - range - 1 || i === currentPage + range + 1) {
                nums += `<span class="tx-page-ellipsis">…</span>`;
            }
        }
        numbersEl.innerHTML = nums;

        document.getElementById('tx-prev-btn').disabled  = currentPage === 0;
        document.getElementById('tx-first-btn').disabled = currentPage === 0;
        document.getElementById('tx-next-btn').disabled  = currentPage >= totalPages - 1;
        document.getElementById('tx-last-btn').disabled  = currentPage >= totalPages - 1;
    }

    function goToPage(page) {
        currentPage = page;
        displayTransactionPage();
    }

    function goToFirstPage() {
        currentPage = 0;
        displayTransactionPage();
    }

    function goToLastPage() {
        currentPage = Math.max(0, Math.ceil(allTransactions.length / pageSize) - 1);
        displayTransactionPage();
    }

    function nextTransactionPage() {
        const totalPages = Math.ceil(allTransactions.length / pageSize);
        if (currentPage < totalPages - 1) {
            currentPage++;
            displayTransactionPage();
        }
    }

    function previousTransactionPage() {
        if (currentPage > 0) {
            currentPage--;
            displayTransactionPage();
        }
    }

    function drawCategoryChart(data) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        if (categoryChartInstance) {
            categoryChartInstance.destroy();
        }

        if (categoryChartType === 'pie') {
            categoryChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.category),
                    datasets: [{
                        data: data.map(d => d.total),
                        backgroundColor: data.map(d => d.color || '#3498db')
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {display: false}
                    }
                }
            });
            document.getElementById('categoryLegendContainer').style.display = 'block';
        } else if (categoryChartType === 'bar') {
            categoryChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.category),
                    datasets: [{
                        label: 'Expense',
                        data: data.map(d => d.total),
                        backgroundColor: data.map(d => d.color || '#3498db'),
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
            document.getElementById('categoryLegendContainer').style.display = 'none';
        }

        // Generate simple category legend
        const legendContainer = document.getElementById('categoryLegend');
        legendContainer.innerHTML = data.map(d => `
            <div class="d-flex align-items-center mb-2">
                <div style="width: 16px; height: 16px; background-color: ${d.color || '#3498db'}; border-radius: 3px; margin-right: 8px; flex-shrink: 0;"></div>
                <span style="font-size: 0.9rem;">${d.category}</span>
            </div>
        `).join('');
    }

    function switchCategoryChart(type) {
        categoryChartType = type;
        document.getElementById('categoryPieBtn').classList.toggle('active', type === 'pie');
        document.getElementById('categoryBarBtn').classList.toggle('active', type === 'bar');
        drawCategoryChart(categoryChartData);
    }

    function drawMonthlyChart(data) {
        // Fiscal year: July 2026 - June 2027
        const fiscalYear = ['Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
        const monthMap = {
            '07': 'Jul', '08': 'Aug', '09': 'Sep', '10': 'Oct', '11': 'Nov', '12': 'Dec',
            '01': 'Jan', '02': 'Feb', '03': 'Mar', '04': 'Apr', '05': 'May', '06': 'Jun'
        };

        // Initialize all fiscal months with 0 values
        const months = {};
        fiscalYear.forEach(month => {
            months[month] = { income: 0, expense: 0 };
        });

        // Populate with actual data
        data.forEach(d => {
            if (d.month) {
                const monthNum = d.month.toString().padStart(2, '0').slice(-2);
                const monthLabel = monthMap[monthNum];
                if (monthLabel && months[monthLabel]) {
                    if (d.type === 'income') months[monthLabel].income = Number(d.total);
                    else months[monthLabel].expense = Number(d.total);
                }
            }
        });

        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if (monthlyChartInstance) {
            monthlyChartInstance.destroy();
        }

        if (monthlyChartType === 'line') {
            monthlyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fiscalYear,
                    datasets: [
                        {
                            label: 'Income',
                            data: fiscalYear.map(m => months[m].income),
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Expense',
                            data: fiscalYear.map(m => months[m].expense),
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        } else if (monthlyChartType === 'bar') {
            monthlyChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: fiscalYear,
                    datasets: [
                        {
                            label: 'Income',
                            data: fiscalYear.map(m => months[m].income),
                            backgroundColor: '#28a745',
                            borderRadius: 6,
                            borderSkipped: false
                        },
                        {
                            label: 'Expense',
                            data: fiscalYear.map(m => months[m].expense),
                            backgroundColor: '#dc3545',
                            borderRadius: 6,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
    }

    function switchMonthlyChart(type) {
        monthlyChartType = type;
        document.getElementById('monthlyLineBtn').classList.toggle('active', type === 'line');
        document.getElementById('monthlyBarBtn').classList.toggle('active', type === 'bar');
        drawMonthlyChart(monthlyChartData);
    }

    async function deleteTransaction(id) {
        if (!confirm('Are you sure you want to delete this transaction?')) {
            return;
        }
        try {
            const response = await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
            if (response.ok) {
                showNotification('Transaction deleted successfully', 'success');
                loadDashboard();
            } else {
                showNotification('Failed to delete transaction', 'error');
            }
        } catch (error) {
            console.error('Error deleting transaction:', error);
            showNotification('Error deleting transaction', 'error');
        }
    }

    function showNotification(message, type = 'success') {
        const notificationHTML = `
            <div class="alert alert-${type === 'success' ? 'success' : 'danger'} alert-dismissible fade show" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 300px;">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        const container = document.createElement('div');
        container.innerHTML = notificationHTML;
        document.body.appendChild(container.firstElementChild);
        
        setTimeout(() => {
            container.firstElementChild?.remove();
        }, 5000);
    }
</script>
