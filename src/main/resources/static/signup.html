<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #18230F 0%, #27391C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background: #18230F;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            min-height: 600px;
        }

        /* Left Section - Image/Background */
        .left-section {
            background: linear-gradient(135deg, #27391C 0%, #18230F 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-section::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37, 95, 56, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
        }

        .logo-left {
            font-size: 24px;
            font-weight: 700;
            color: white;
            z-index: 1;
        }

        .logo-left i {
            color: #255F38;
            margin-right: 8px;
        }

        .stats-box {
            z-index: 1;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(37, 95, 56, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(37, 95, 56, 0.2);
        }

        .stat-icon {
            font-size: 20px;
            color: #255F38;
            width: 30px;
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 14px;
            color: white;
            font-weight: 600;
        }

        .stat-change {
            font-size: 12px;
            color: #1F7D53;
            margin-left: auto;
        }

        /* Right Section - Form */
        .right-section {
            background: #18230F;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }


        .heading {
            font-size: 28px;
            color: white;
            font-weight: 700;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .tabs-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: #255F38;
            color: white;
            padding: 12px 32px;
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.9);
        }

        .form-wrapper {
            position: relative;
            flex: 1;
        }

        .form-section {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            opacity: 1;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            visibility: visible;
        }

        .form-section.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .notification {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .notification.success {
            background: rgba(37, 95, 56, 0.1);
            color: #1F7D53;
            border: 1px solid rgba(37, 95, 56, 0.3);
            display: block;
        }

        .notification.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            outline: none;
            background: rgba(37, 95, 56, 0.08);
            border-color: #255F38;
            box-shadow: 0 0 10px rgba(37, 95, 56, 0.2);
        }

        input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        input.success {
            border-color: #255F38;
            background: rgba(37, 95, 56, 0.05);
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 32px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
        }

        .input-icon.success {
            color: #255F38;
        }

        .input-icon.error {
            color: #ef4444;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 18px 0 24px 0;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #255F38;
        }

        .checkbox-group label {
            margin: 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: none;
            letter-spacing: normal;
            font-weight: normal;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #255F38;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        button.btn-submit {
            width: 100%;
            padding: 12px 24px;
            background: #255F38;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-submit:hover {
            background: #1F7D53;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 95, 56, 0.3);
        }

        button.btn-submit:active {
            transform: translateY(0);
        }

        .footer-link {
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .footer-link a {
            color: #255F38;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .left-section {
                display: none;
            }

            .right-section {
                padding: 30px 25px;
            }

            .heading {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .tabs-section {
                gap: 10px;
                margin-bottom: 20px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Left Section -->
        <div class="left-section">
            <div class="logo-left">
                <i class="fas fa-wallet"></i>FinTrack
            </div>

            <div class="stats-box">
                <div class="stat-item">
                    <div class="stat-icon">
                        <i class="fab fa-ethereum"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">ETH</div>
                        <div class="stat-value">$2,456.78</div>
                    </div>
                    <div class="stat-change">+8.5%</div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">USD</div>
                        <div class="stat-value">$45,230.12</div>
                    </div>
                    <div class="stat-change">+3.2%</div>
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="heading">Welcome to FinTrack!</div>

            <div class="tabs-section">
                <button class="tab-btn active" id="login-tab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="signup-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="form-wrapper">
                <!-- Login Form -->
                <div id="login-form" class="form-section">
                    <div id="login-notification" class="notification"></div>

                    <div class="form-group">
                        <label>Email or Username</label>
                        <input type="text" id="login-username" placeholder="Enter your email or username">
                        <i class="fas fa-check input-icon"></i>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password">
                        <i class="fas fa-check input-icon"></i>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>

                    <button class="btn-submit" onclick="handleLogin()">Login</button>

                    <div class="footer-link">
                        Don't have an account? <a onclick="switchTab('signup'); return false;">Sign Up</a>
                    </div>
                </div>

                <!-- Sign Up Form -->
                <div id="signup-form" class="form-section hidden">
                    <div id="signup-notification" class="notification"></div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="signup-fullname" placeholder="Enter your full name">
                            <i class="fas fa-check input-icon"></i>
                        </div>

                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="signup-username" placeholder="Choose a username">
                            <i class="fas fa-check input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="Enter your email address">
                        <i class="fas fa-check input-icon"></i>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Create a strong password">
                        <i class="fas fa-check input-icon"></i>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signup-confirm-password" placeholder="Confirm your password">
                        <i class="fas fa-check input-icon"></i>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-terms">
                        <label for="agree-terms">I agree to the <a href="#">Terms and Conditions</a></label>
                    </div>

                    <button class="btn-submit" onclick="handleSignup()">Sign Up</button>

                    <div class="footer-link">
                        Already have an account? <a onclick="switchTab('login'); return false;">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
            }
            clearForm();
        }

        function clearForm() {
            document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]').forEach(input => {
                input.value = '';
                input.classList.remove('success', 'error');
            });
            document.querySelectorAll('.notification').forEach(notif => {
                notif.classList.remove('success', 'error');
                notif.textContent = '';
            });
        }

        async function handleLogin() {
            const usernameOrEmail = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const notification = document.getElementById('login-notification');

            if (!usernameOrEmail || !password) {
                showNotification(notification, 'Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernameOrEmail, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.token) localStorage.setItem('token', data.token);
                    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                    showNotification(notification, '✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showNotification(notification, data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showNotification(notification, 'Connection error', 'error');
            }
        }

        async function handleSignup() {
            const fullName = document.getElementById('signup-fullname').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const username = document.getElementById('signup-username').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;
            const agreeTerms = document.getElementById('agree-terms').checked;
            const notification = document.getElementById('signup-notification');

            if (!fullName || !email || !username || !password || !confirmPassword) {
                showNotification(notification, 'Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showNotification(notification, 'Passwords do not match', 'error');
                return;
            }

            if (!agreeTerms) {
                showNotification(notification, 'Please agree to the terms', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, username, email, password, confirmPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.token) localStorage.setItem('token', data.token);
                    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                    showNotification(notification, '✅ Registration successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showNotification(notification, data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showNotification(notification, 'Connection error', 'error');
            }
        }

        function showNotification(element, message, type) {
            element.textContent = message;
            element.classList.remove('success', 'error');
            element.classList.add(type);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('input[type="email"], input[type="text"], input[type="password"]').forEach(input => {
                input.addEventListener('blur', validateInput);
                input.addEventListener('focus', function() {
                    this.classList.remove('success', 'error');
                    const icon = this.parentElement.querySelector('.input-icon');
                    if (icon) icon.classList.remove('success', 'error');
                });
            });
        });

        function validateInput(e) {
            const input = e.target;
            const icon = input.parentElement.querySelector('.input-icon');
            const value = input.value.trim();

            if (!value) {
                input.classList.remove('success', 'error');
                if (icon) icon.classList.remove('success', 'error');
                return;
            }

            if (input.type === 'email') {
                const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
                if (isValid) {
                    input.classList.add('success');
                    if (icon) icon.classList.add('success');
                } else {
                    input.classList.add('error');
                    if (icon) icon.classList.add('error');
                }
            } else if (input.id.includes('password')) {
                if (value.length >= 6) {
                    input.classList.add('success');
                    if (icon) icon.classList.add('success');
                } else {
                    input.classList.add('error');
                    if (icon) icon.classList.add('error');
                }
            } else {
                input.classList.add('success');
                if (icon) icon.classList.add('success');
            }
        }
    </script>
</body>
</html>
