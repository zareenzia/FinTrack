<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
<div id="toastContainer" class="notification-toast-container" aria-live="polite" aria-atomic="true"></div>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4"><i class="fas fa-exchange-alt"></i> Transactions</h2>
        </div>
    </div>

    <div class="row mb-4 g-4">
        <!-- Add New Transaction -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Add New Transaction</h6>
                </div>
                <div class="card-body">
                    <form id="transactionForm">
                        <div class="mb-2">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" class="form-control form-control-sm" id="description" required placeholder="e.g., Grocery shopping">
                        </div>
                        <div class="mb-2">
                            <label for="amount" class="form-label">Amount</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">৳</span>
                                <input type="number" class="form-control" id="amount" step="0.01" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-7">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select form-select-sm" id="category" required>
                                    <option value="">Select category</option>
                                </select>
                            </div>
                            <div class="col-5">
                                <label for="type" class="form-label">Type</label>
                                <select class="form-select form-select-sm" id="type" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                    <option value="savings">Savings</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control form-control-sm" id="date" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-sm" style="padding:8px;">
                            <i class="fas fa-save me-1"></i> Add Transaction
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Assets -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-building me-2"></i>Assets</h6>
                </div>
                <div class="card-body">
                    <form id="assetForm" class="mb-3">
                        <div class="row g-2 mb-2">
                            <div class="col-7">
                                <label for="assetName" class="form-label">Asset Name</label>
                                <input type="text" class="form-control form-control-sm" id="assetName" required placeholder="e.g., Savings Account">
                            </div>
                            <div class="col-5">
                                <label for="assetType" class="form-label">Type</label>
                                <input type="text" class="form-control form-control-sm" id="assetType" placeholder="Cash, Property…">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="assetValue" class="form-label">Current Value</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">৳</span>
                                <input type="number" class="form-control" id="assetValue" step="0.01" min="0" required placeholder="0.00">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100" style="padding:8px;">
                            <i class="fas fa-plus me-1"></i> Add Asset
                        </button>
                    </form>
                    <div class="d-flex justify-content-between align-items-center mb-2 px-1" style="font-size:0.85rem;">
                        <span style="font-weight:600;">Total Asset Value</span>
                        <span id="total-asset-value" style="font-weight:700;color:var(--accent-color);">$0.00</span>
                    </div>
                    <div id="assetList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Manage Categories Modal -->
<div class="modal fade" id="manageCategoriesModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">
                    <i class="fas fa-tags"></i> Manage Categories
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="max-height: 500px; overflow-y: auto;">
                <button class="btn btn-success w-100 mb-3" type="button" id="addNewCategoryBtn">
                    <i class="fas fa-plus"></i> Add New Category
                </button>
                <div id="categoriesListContainer"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="editCategoryName" class="form-label">Category Name</label>
                    <input type="text" class="form-control" id="editCategoryName" placeholder="Category name">
                </div>
                <div class="mb-3">
                    <label for="editCategoryColor" class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="editCategoryColor" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveCategoryChangesBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Category Modal -->
<div class="modal fade" id="deleteCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Do you want to delete this category?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteCategoryBtn">Yes, Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Add New Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="newCategoryName" class="form-label">Category Name</label>
                    <input type="text" class="form-control" id="newCategoryName" placeholder="Enter category name">
                </div>
                <div class="mb-3">
                    <label for="newCategoryType" class="form-label">Category Type</label>
                    <select class="form-select" id="newCategoryType">
                        <option value="general">General (all types)</option>
                        <option value="expense">Expense</option>
                        <option value="savings">Savings</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="newCategoryColor" class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="newCategoryColor" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="createCategoryBtn">Create Category</button>
            </div>
        </div>
    </div>
</div>

<script>
    function getUserStorageKey(baseKey) {
        try {
            var raw = localStorage.getItem('finzin_user') || localStorage.getItem('user');
            var u = JSON.parse(raw);
            if (u && u.id) return baseKey + '_' + u.id;
        } catch(e) {}
        return baseKey;
    }
    let cachedAssets = [];
    let editCategoryId = null;
    let deleteCategoryId = null;
    let manageCategoriesModal = null;
    let editCategoryModal = null;
    let deleteCategoryModal = null;
    let addCategoryModal = null;
    document.getElementById('date').valueAsDate = new Date();

    const CURRENCY_DEFAULTS = { currencySymbol:'৳', symbolPosition:'before', decimalPlaces:0 };
    function getCurrencySettings() {
        try {
            var s = Object.assign({}, CURRENCY_DEFAULTS, JSON.parse(localStorage.getItem(getUserStorageKey('fintrack_settings')) || '{}'));
            return { symbol: s.currencySymbol || '৳', position: s.symbolPosition || 'before', decimals: Number(s.decimalPlaces) >= 0 ? Number(s.decimalPlaces) : 0 };
        } catch(e) { return { symbol: '৳', position: 'before', decimals: 0 }; }
    }
    function formatAmount(value) {
        var c = getCurrencySettings();
        var num = Number(value).toFixed(c.decimals);
        return c.position === 'before' ? c.symbol + num : num + '\u00a0' + c.symbol;
    }
    function applyCurrencySymbolToInputs() {
        var sym = getCurrencySettings().symbol;
        document.querySelectorAll('.input-group-text').forEach(function(el) {
            if (el.textContent.trim() === '$' || el.textContent.trim() === '৳') el.textContent = sym;
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        manageCategoriesModal = new bootstrap.Modal(document.getElementById('manageCategoriesModal'));
        editCategoryModal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
        deleteCategoryModal = new bootstrap.Modal(document.getElementById('deleteCategoryModal'));
        addCategoryModal = new bootstrap.Modal(document.getElementById('addCategoryModal'));
        
        document.getElementById('saveCategoryChangesBtn').addEventListener('click', saveCategoryChanges);
        document.getElementById('confirmDeleteCategoryBtn').addEventListener('click', confirmDeleteCategory);
        document.getElementById('addNewCategoryBtn').addEventListener('click', openAddCategoryModal);
        document.getElementById('createCategoryBtn').addEventListener('click', createNewCategory);
        
        loadCategories(document.getElementById('type').value);
        loadAssets();
        applyCurrencySymbolToInputs();
    });

    function openCategoryManagementModal(e) {
        e.preventDefault();
        loadCategoriesForManagement();
        manageCategoriesModal.show();
    }

    async function loadCategories(type) {
        try {
            const url = type ? `/api/categories?type=${encodeURIComponent(type)}` : '/api/categories';
            const response = await fetch(url);
            const categories = await response.json();
            cachedCategories = categories;

            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Select a category</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        } catch (error) {
            showTopNotification('Unable to load categories.', 'error');
        }
    }

    document.getElementById('type').addEventListener('change', function () {
        loadCategories(this.value);
    });

    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const transaction = {
            description: document.getElementById('description').value,
            amount: parseFloat(document.getElementById('amount').value),
            category_id: parseInt(document.getElementById('category').value, 10),
            transaction_type: document.getElementById('type').value,
            date: document.getElementById('date').value
        };

        try {
            const response = await fetch('/api/transactions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(transaction)
            });

            if (response.ok) {
                document.getElementById('transactionForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Transaction added.', 'success');
            } else {
                showTopNotification('Failed to add transaction.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to add transaction right now.', 'error');
        }
    });

    document.getElementById('assetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const asset = {
            name: document.getElementById('assetName').value.trim(),
            type: document.getElementById('assetType').value.trim(),
            value: parseFloat(document.getElementById('assetValue').value),
            description: ''
        };

        if (!asset.name || Number.isNaN(asset.value)) {
            showTopNotification('Asset name and value are required.', 'error');
            return;
        }

        try {
            const response = await fetch('/api/assets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(asset)
            });
            if (response.ok) {
                document.getElementById('assetForm').reset();
                loadAssets();
                showTopNotification('Asset added successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Failed to add asset.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to add asset right now.', 'error');
        }
    });

    async function loadAssets() {
        try {
            const response = await fetch('/api/assets');
            const assets = await response.json();
            cachedAssets = assets;
            const total = assets.reduce((sum, a) => sum + Number(a.value || 0), 0);
            document.getElementById('total-asset-value').textContent = formatAmount(total);

            const list = document.getElementById('assetList');
            if (!assets.length) {
                list.innerHTML = '<p class="text-muted mb-0">No assets added yet</p>';
                return;
            }

            list.innerHTML = assets.map(asset => `
                <div class="card mb-2">
                    <div class="card-body py-2 d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${asset.name}</h6>
                            <small class="text-muted">${asset.type || 'General'}</small>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-secondary">${formatAmount(asset.value)}</div>
                            <button class="btn btn-sm btn-danger" onclick="deleteAsset(${asset.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            showTopNotification('Unable to load assets.', 'error');
        }
    }

    async function deleteAsset(id) {
        try {
            const response = await fetch(`/api/assets/${id}`, {method: 'DELETE'});
            if (response.ok) {
                loadAssets();
                showTopNotification('Asset deleted successfully.', 'success');
            } else {
                showTopNotification('Failed to delete asset.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete asset right now.', 'error');
        }
    }

    function showTopNotification(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `notification-toast notification-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }

    // ============== CATEGORY MANAGEMENT FUNCTIONS ==============
    async function loadCategoriesForManagement() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            cachedCategories = categories;

            const container = document.getElementById('categoriesListContainer');
            if (!categories.length) {
                container.innerHTML = '<p class="text-muted">No categories yet. Create one to get started!</p>';
                return;
            }

            container.innerHTML = categories.map(cat => `
                <div class="card mb-3" style="border-left: 5px solid ${cat.color}">
                    <div class="card-body py-3 d-flex justify-content-between align-items-center">
                        <div style="flex: 1;">
                            <h6 class="card-title mb-0" style="color: ${cat.color}; font-weight: bold;">
                                ${cat.name}
                            </h6>
                            <small class="text-muted">Color: ${cat.color}</small>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-sm btn-outline-primary" onclick="editCategory(${cat.id})" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${cat.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            showTopNotification('Unable to load categories.', 'error');
        }
    }

    function editCategory(id) {
        const current = cachedCategories.find(c => c.id === id);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }
        editCategoryId = id;
        document.getElementById('editCategoryName').value = current.name || '';
        document.getElementById('editCategoryColor').value = current.color || '#3498db';
        editCategoryModal.show();
    }

    async function saveCategoryChanges() {
        if (editCategoryId === null) return;
        const current = cachedCategories.find(c => c.id === editCategoryId);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }

        const newName = document.getElementById('editCategoryName').value.trim();
        const newColor = document.getElementById('editCategoryColor').value.trim() || '#3498db';
        if (!newName) {
            showTopNotification('Category name cannot be empty.', 'error');
            return;
        }

        try {
            const response = await fetch(`/api/categories/${editCategoryId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: newName,
                    color: newColor,
                    icon: current.icon || 'tag',
                    description: current.description || ''
                })
            });

            if (response.ok) {
                editCategoryModal.hide();
                editCategoryId = null;
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category updated successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error updating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to update category right now.', 'error');
        }
    }

    function deleteCategory(id) {
        deleteCategoryId = id;
        deleteCategoryModal.show();
    }

    async function confirmDeleteCategory() {
        if (deleteCategoryId === null) return;
        try {
            const response = await fetch(`/api/categories/${deleteCategoryId}`, {method: 'DELETE'});
            if (response.ok) {
                deleteCategoryModal.hide();
                deleteCategoryId = null;
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category deleted successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error deleting category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete category right now.', 'error');
        }
    }

    function openAddCategoryModal() {
        document.getElementById('newCategoryName').value = '';
        document.getElementById('newCategoryColor').value = '#3498db';
        // Pre-select type matching the current transaction type
        const currentType = document.getElementById('type').value || 'general';
        const typeEl = document.getElementById('newCategoryType');
        if (typeEl) typeEl.value = currentType;
        addCategoryModal.show();
    }

    async function createNewCategory() {
        const name  = document.getElementById('newCategoryName').value.trim();
        const color = document.getElementById('newCategoryColor').value;
        const catType = document.getElementById('newCategoryType').value || 'general';

        if (!name) {
            showTopNotification('Category name cannot be empty.', 'error');
            return;
        }

        const category = {
            name: name,
            color: color,
            icon: 'tag',
            categoryType: catType
        };

        try {
            const response = await fetch('/api/categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(category)
            });
            if (response.ok) {
                addCategoryModal.hide();
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category created successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error creating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to create category right now.', 'error');
        }
    }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
