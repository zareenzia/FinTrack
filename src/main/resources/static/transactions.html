<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="toastContainer" class="notification-toast-container" aria-live="polite" aria-atomic="true"></div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="fas fa-wallet"></i> FinTrack
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/transactions">Transactions</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4"><i class="fas fa-exchange-alt"></i> Transactions</h2>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h6 class="mb-0"><i class="fas fa-plus"></i> Add New Transaction</h6>
                </div>
                <div class="card-body">
                    <form id="transactionForm">
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" class="form-control" id="description" required placeholder="e.g., Grocery shopping">
                        </div>
                        <div class="mb-3">
                            <label for="amount" class="form-label">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="amount" step="0.01" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select or create a category</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" required>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-save"></i> Add Transaction
                        </button>
                    </form>
                </div>
            </div>

            <div class="card mt-4">
                <div class="card-header bg-info text-white">
                    <h6 class="mb-0"><i class="fas fa-tags"></i> Manage Categories</h6>
                </div>
                <div class="card-body">
                    <form id="categoryForm">
                        <div class="mb-3">
                            <label for="catName" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="catName" required placeholder="e.g., Groceries">
                        </div>
                        <div class="mb-3">
                            <label for="catColor" class="form-label">Color</label>
                            <input type="color" class="form-control form-control-color" id="catColor" value="#3498db">
                        </div>
                        <button type="submit" class="btn btn-info w-100">
                            <i class="fas fa-plus"></i> Create Category
                        </button>
                    </form>
                    <div id="categoriesList" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0"><i class="fas fa-list"></i> All Transactions</h6>
                </div>
                <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                    <div id="transactionsList"></div>
                </div>
            </div>

            <div class="card mt-4">
                <div class="card-header bg-secondary text-white">
                    <h6 class="mb-0"><i class="fas fa-building"></i> Assets</h6>
                </div>
                <div class="card-body">
                    <form id="assetForm" class="mb-3">
                        <div class="mb-2">
                            <label for="assetName" class="form-label">Asset Name</label>
                            <input type="text" class="form-control" id="assetName" required placeholder="e.g., Savings Account">
                        </div>
                        <div class="mb-2">
                            <label for="assetType" class="form-label">Type</label>
                            <input type="text" class="form-control" id="assetType" placeholder="e.g., Cash, Property, Investment">
                        </div>
                        <div class="mb-2">
                            <label for="assetValue" class="form-label">Current Value</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="assetValue" step="0.01" min="0" required placeholder="0.00">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100">
                            <i class="fas fa-plus"></i> Add Asset
                        </button>
                    </form>
                    <div class="d-flex justify-content-between mb-2">
                        <strong>Total Asset Value</strong>
                        <strong id="total-asset-value">$0.00</strong>
                    </div>
                    <div id="assetList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-5 py-3 bg-light text-center">
    <div class="container">
        <span class="text-muted">© 2024 FinTrack - Personal Financial Tracker</span>
    </div>
</footer>

<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="editCategoryName" class="form-label">Category Name</label>
                    <input type="text" class="form-control" id="editCategoryName" placeholder="Category name">
                </div>
                <div class="mb-3">
                    <label for="editCategoryColor" class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="editCategoryColor" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveCategoryChangesBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                do you want to delete this?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteCategoryBtn">Yes, Delete</button>
            </div>
        </div>
    </div>
</div>

<script>
    let cachedCategories = [];
    let cachedAssets = [];
    let editCategoryId = null;
    let deleteCategoryId = null;
    let editCategoryModal = null;
    let deleteCategoryModal = null;
    document.getElementById('date').valueAsDate = new Date();

    document.addEventListener('DOMContentLoaded', function () {
        editCategoryModal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
        deleteCategoryModal = new bootstrap.Modal(document.getElementById('deleteCategoryModal'));
        document.getElementById('saveCategoryChangesBtn').addEventListener('click', saveCategoryChanges);
        document.getElementById('confirmDeleteCategoryBtn').addEventListener('click', confirmDeleteCategory);
        loadCategories();
        loadTransactions();
        loadAssets();
    });

    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const category = {
            name: document.getElementById('catName').value,
            color: document.getElementById('catColor').value,
            icon: 'tag'
        };

        try {
            const response = await fetch('/api/categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(category)
            });
            if (response.ok) {
                document.getElementById('categoryForm').reset();
                loadCategories();
                showTopNotification('Category created successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error creating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to create category right now.', 'error');
        }
    });

    async function loadCategories() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            cachedCategories = categories;

            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Select a category</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });

            const list = document.getElementById('categoriesList');
            list.innerHTML = categories.map(cat => `
                <span class="badge" style="background:${cat.color}">
                    ${cat.name}
                    <button type="button" onclick="editCategory(${cat.id})" title="Edit category">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button type="button" onclick="deleteCategory(${cat.id})">&times;</button>
                </span>
            `).join('');
        } catch (error) {
            showTopNotification('Unable to load categories.', 'error');
        }
    }

    async function editCategory(id) {
        const current = cachedCategories.find(c => c.id === id);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }
        editCategoryId = id;
        document.getElementById('editCategoryName').value = current.name || '';
        document.getElementById('editCategoryColor').value = current.color || '#3498db';
        editCategoryModal.show();
    }

    async function saveCategoryChanges() {
        if (editCategoryId === null) return;
        const current = cachedCategories.find(c => c.id === editCategoryId);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }

        const newName = document.getElementById('editCategoryName').value.trim();
        const newColor = document.getElementById('editCategoryColor').value.trim() || '#3498db';
        if (!newName) {
            showTopNotification('Category name cannot be empty.', 'error');
            return;
        }

        try {
            const response = await fetch(`/api/categories/${editCategoryId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: newName,
                    color: newColor,
                    icon: current.icon || 'tag',
                    description: current.description || ''
                })
            });

            if (response.ok) {
                editCategoryModal.hide();
                editCategoryId = null;
                loadCategories();
                loadTransactions();
                showTopNotification('Category updated successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error updating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to update category right now.', 'error');
        }
    }

    function deleteCategory(id) {
        deleteCategoryId = id;
        deleteCategoryModal.show();
    }

    async function confirmDeleteCategory() {
        if (deleteCategoryId === null) return;
        try {
            const response = await fetch(`/api/categories/${deleteCategoryId}`, {method: 'DELETE'});
            if (response.ok) {
                deleteCategoryModal.hide();
                deleteCategoryId = null;
                loadCategories();
                loadTransactions();
                showTopNotification('Category deleted successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error deleting category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete category right now.', 'error');
        }
    }

    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const transaction = {
            description: document.getElementById('description').value,
            amount: parseFloat(document.getElementById('amount').value),
            category_id: parseInt(document.getElementById('category').value, 10),
            transaction_type: document.getElementById('type').value,
            date: document.getElementById('date').value
        };

        try {
            const response = await fetch('/api/transactions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(transaction)
            });

            if (response.ok) {
                document.getElementById('transactionForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                loadTransactions();
                showTopNotification('Transaction added.', 'success');
            } else {
                showTopNotification('Failed to add transaction.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to add transaction right now.', 'error');
        }
    });

    document.getElementById('assetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const asset = {
            name: document.getElementById('assetName').value.trim(),
            type: document.getElementById('assetType').value.trim(),
            value: parseFloat(document.getElementById('assetValue').value),
            description: ''
        };

        if (!asset.name || Number.isNaN(asset.value)) {
            showTopNotification('Asset name and value are required.', 'error');
            return;
        }

        try {
            const response = await fetch('/api/assets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(asset)
            });
            if (response.ok) {
                document.getElementById('assetForm').reset();
                loadAssets();
                showTopNotification('Asset added successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Failed to add asset.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to add asset right now.', 'error');
        }
    });

    async function loadTransactions() {
        try {
            const response = await fetch('/api/transactions');
            const transactions = await response.json();
            const list = document.getElementById('transactionsList');
            if (!transactions.length) {
                list.innerHTML = '<p class="text-muted">No transactions yet</p>';
                return;
            }

            list.innerHTML = transactions.map(tx => `
            <div class="card mb-2">
                <div class="card-body py-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${tx.description}</h6>
                            <small class="text-muted">${new Date(tx.date).toLocaleDateString()} • ${tx.category_name}</small>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold ${tx.transaction_type === 'income' ? 'text-success' : 'text-danger'}">
                                ${tx.transaction_type === 'income' ? '+' : '-'}$${Number(tx.amount).toFixed(2)}
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteTransaction(${tx.id})">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        } catch (error) {
            showTopNotification('Unable to load transactions.', 'error');
        }
    }

    async function deleteTransaction(id) {
        try {
            const response = await fetch(`/api/transactions/${id}`, {method: 'DELETE'});
            if (response.ok) {
                loadTransactions();
                showTopNotification('Transaction deleted.', 'success');
            } else {
                showTopNotification('Failed to delete transaction.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete transaction right now.', 'error');
        }
    }

    async function loadAssets() {
        try {
            const response = await fetch('/api/assets');
            const assets = await response.json();
            cachedAssets = assets;
            const total = assets.reduce((sum, a) => sum + Number(a.value || 0), 0);
            document.getElementById('total-asset-value').textContent = '$' + total.toFixed(2);

            const list = document.getElementById('assetList');
            if (!assets.length) {
                list.innerHTML = '<p class="text-muted mb-0">No assets added yet</p>';
                return;
            }

            list.innerHTML = assets.map(asset => `
                <div class="card mb-2">
                    <div class="card-body py-2 d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${asset.name}</h6>
                            <small class="text-muted">${asset.type || 'General'}</small>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-secondary">$${Number(asset.value).toFixed(2)}</div>
                            <button class="btn btn-sm btn-danger" onclick="deleteAsset(${asset.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            showTopNotification('Unable to load assets.', 'error');
        }
    }

    async function deleteAsset(id) {
        try {
            const response = await fetch(`/api/assets/${id}`, {method: 'DELETE'});
            if (response.ok) {
                loadAssets();
                showTopNotification('Asset deleted successfully.', 'success');
            } else {
                showTopNotification('Failed to delete asset.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete asset right now.', 'error');
        }
    }

    function showTopNotification(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `notification-toast notification-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
