<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <style>
        .amount-calc-btn:hover { background: var(--surface-color) !important; border-color: var(--surface-color) !important; }
        /* Transfer flow layout */
        .transfer-flow { display: flex; align-items: flex-end; gap: 8px; }
        .transfer-flow-field { flex: 1; min-width: 0; }
        .transfer-flow-arrow { flex-shrink: 0; padding-bottom: 6px; color: var(--accent-color); font-size: 1.1rem; }
    </style>
</head>
<body>
<div id="toastContainer" class="notification-toast-container" aria-live="polite" aria-atomic="true"></div>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4"><i class="fas fa-exchange-alt"></i> Transactions</h2>
        </div>
    </div>

    <div class="row mb-4 g-4">
        <!-- Add New Transaction -->
        <div class="col-md-7">
            <div class="card h-100">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Add New Transaction</h6>
                </div>
                <div class="card-body">
                    <form id="transactionForm">
                        <div class="row g-3">
                            <div class="col-md-6 mb-2">
                                <label for="description" class="form-label">Description</label>
                                <input type="text" class="form-control form-control-sm" id="description" required placeholder="e.g., Grocery shopping">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="amount" class="form-label">Amount</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">৳</span>
                                    <input type="number" class="form-control" id="amount" step="0.01" required placeholder="0.00">
                                    <button type="button" class="input-group-text amount-calc-btn" id="amountCalcBtn" title="Open Calculator" onclick="if(window.openCalcForInput) window.openCalcForInput('amount'); else if(window.openCalc) window.openCalc();" style="cursor:pointer; background:var(--accent-color); border-color:var(--accent-color); color:#fff; transition:background 0.2s;">
                                        <i class="fas fa-calculator" style="font-size:0.8rem;"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select form-select-sm" id="category" required>
                                    <option value="">Select category</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label for="type" class="form-label">Type</label>
                                <select class="form-select form-select-sm" id="type" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                    <option value="savings">Savings</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label for="date" class="form-label">Date</label>
                                <input type="date" class="form-control form-control-sm" id="date" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="sourceAccount" class="form-label">Account <small class="text-muted">(optional)</small></label>
                                <select class="form-select form-select-sm" id="sourceAccount">
                                    <option value="">-- No account --</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100 btn-sm" style="padding:8px;">
                                    <i class="fas fa-save me-1"></i> Add Transaction
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Log Cash Transfer -->
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-random me-2"></i>Log Cash Transfer</h6>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="text-muted small mb-3">Move money between any of your accounts — bank, MFS, cash wallet, or credit card. Balances update instantly.</p>
                    <form id="transferForm" class="flex-grow-1 d-flex flex-column">
                        <!-- From → To visual flow -->
                        <div class="transfer-flow mb-3">
                            <div class="transfer-flow-field">
                                <label class="form-label fw-semibold"><i class="fas fa-arrow-up-from-bracket me-1 text-danger"></i>From Account</label>
                                <select class="form-select form-select-sm" id="transferFrom" required>
                                    <option value="">Select source…</option>
                                </select>
                            </div>
                            <div class="transfer-flow-arrow">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                            <div class="transfer-flow-field">
                                <label class="form-label fw-semibold"><i class="fas fa-arrow-down-to-bracket me-1 text-success"></i>To Account</label>
                                <select class="form-select form-select-sm" id="transferTo" required>
                                    <option value="">Select destination…</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Amount</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">৳</span>
                                <input type="number" class="form-control" id="transferAmount" step="0.01" min="0.01" required placeholder="0.00">
                                <button type="button" class="input-group-text amount-calc-btn" title="Open Calculator" onclick="if(window.openCalcForInput) window.openCalcForInput('transferAmount'); else if(window.openCalc) window.openCalc();" style="cursor:pointer; background:var(--accent-color); border-color:var(--accent-color); color:#fff;">
                                    <i class="fas fa-calculator" style="font-size:0.8rem;"></i>
                                </button>
                            </div>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control form-control-sm" id="transferDate" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Note <small class="text-muted">(optional)</small></label>
                                <input type="text" class="form-control form-control-sm" id="transferNote" placeholder="e.g., Salary split">
                            </div>
                        </div>

                        <div class="mt-auto">
                            <button type="submit" class="btn btn-success w-100 btn-sm" style="padding:8px;">
                                <i class="fas fa-exchange-alt me-1"></i> Log Transfer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Manage Categories Modal -->
<div class="modal fade" id="manageCategoriesModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">
                    <i class="fas fa-tags"></i> Manage Categories
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="max-height: 500px; overflow-y: auto;">
                <button class="btn btn-success w-100 mb-3" type="button" id="addNewCategoryBtn">
                    <i class="fas fa-plus"></i> Add New Category
                </button>
                <div id="categoriesListContainer"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="editCategoryName" class="form-label">Category Name</label>
                    <input type="text" class="form-control" id="editCategoryName" placeholder="Category name">
                </div>
                <div class="mb-3">
                    <label for="editCategoryColor" class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="editCategoryColor" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveCategoryChangesBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Category Modal -->
<div class="modal fade" id="deleteCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Do you want to delete this category?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteCategoryBtn">Yes, Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Add New Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="newCategoryName" class="form-label">Category Name</label>
                    <input type="text" class="form-control" id="newCategoryName" placeholder="Enter category name">
                </div>
                <div class="mb-3">
                    <label for="newCategoryType" class="form-label">Category Type</label>
                    <select class="form-select" id="newCategoryType">
                        <option value="general">General (all types)</option>
                        <option value="expense">Expense</option>
                        <option value="savings">Savings</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="newCategoryColor" class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="newCategoryColor" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="createCategoryBtn">Create Category</button>
            </div>
        </div>
    </div>
</div>

<script>
    function getUserStorageKey(baseKey) {
        try {
            var raw = localStorage.getItem('finzin_user') || localStorage.getItem('user');
            var u = JSON.parse(raw);
            if (u && u.id) return baseKey + '_' + u.id;
        } catch(e) {}
        return baseKey;
    }
    let editCategoryId = null;
    let deleteCategoryId = null;
    let manageCategoriesModal = null;
    let editCategoryModal = null;
    let deleteCategoryModal = null;
    let addCategoryModal = null;
    document.getElementById('date').valueAsDate = new Date();

    const CURRENCY_DEFAULTS = { currencySymbol:'৳', symbolPosition:'before', decimalPlaces:0 };
    function getCurrencySettings() {
        try {
            var s = Object.assign({}, CURRENCY_DEFAULTS, JSON.parse(localStorage.getItem(getUserStorageKey('fintrack_settings')) || '{}'));
            return { symbol: s.currencySymbol || '৳', position: s.symbolPosition || 'before', decimals: Number(s.decimalPlaces) >= 0 ? Number(s.decimalPlaces) : 0 };
        } catch(e) { return { symbol: '৳', position: 'before', decimals: 0 }; }
    }
    function formatAmount(value) {
        var c = getCurrencySettings();
        var num = Number(value).toFixed(c.decimals);
        return c.position === 'before' ? c.symbol + num : num + '\u00a0' + c.symbol;
    }
    function applyCurrencySymbolToInputs() {
        var sym = getCurrencySettings().symbol;
        document.querySelectorAll('.input-group-text').forEach(function(el) {
            if (el.textContent.trim() === '$' || el.textContent.trim() === '৳') el.textContent = sym;
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        manageCategoriesModal = new bootstrap.Modal(document.getElementById('manageCategoriesModal'));
        editCategoryModal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
        deleteCategoryModal = new bootstrap.Modal(document.getElementById('deleteCategoryModal'));
        addCategoryModal = new bootstrap.Modal(document.getElementById('addCategoryModal'));
        
        document.getElementById('saveCategoryChangesBtn').addEventListener('click', saveCategoryChanges);
        document.getElementById('confirmDeleteCategoryBtn').addEventListener('click', confirmDeleteCategory);
        document.getElementById('addNewCategoryBtn').addEventListener('click', openAddCategoryModal);
        document.getElementById('createCategoryBtn').addEventListener('click', createNewCategory);
        
        loadCategories(document.getElementById('type').value);
        loadAccountsIntoSelect();
        applyCurrencySymbolToInputs();
        document.getElementById('transferDate').valueAsDate = new Date();
    });

    function openCategoryManagementModal(e) {
        e.preventDefault();
        loadCategoriesForManagement();
        manageCategoriesModal.show();
    }

    async function loadCategories(type) {
        try {
            const url = type ? `/api/categories?type=${encodeURIComponent(type)}` : '/api/categories';
            const response = await fetch(url);
            const categories = await response.json();
            cachedCategories = categories;

            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Select a category</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        } catch (error) {
            showTopNotification('Unable to load categories.', 'error');
        }
    }

    document.getElementById('type').addEventListener('change', function () {
        loadCategories(this.value);
    });

    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const srcAcctEl = document.getElementById('sourceAccount');
        const transaction = {
            description: document.getElementById('description').value,
            amount: parseFloat(document.getElementById('amount').value),
            category_id: parseInt(document.getElementById('category').value, 10),
            transaction_type: document.getElementById('type').value,
            date: document.getElementById('date').value,
            sourceAccountId: srcAcctEl && srcAcctEl.value ? parseInt(srcAcctEl.value, 10) : null,
            destinationAccountId: null
        };

        try {
            const response = await fetch('/api/transactions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(transaction)
            });

            if (response.ok) {
                document.getElementById('transactionForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Transaction added.', 'success');
            } else {
                showTopNotification('Failed to add transaction.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to add transaction right now.', 'error');
        }
    });

    document.getElementById('transferForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fromId = document.getElementById('transferFrom').value;
        const toId   = document.getElementById('transferTo').value;
        const amount = parseFloat(document.getElementById('transferAmount').value);
        const note   = document.getElementById('transferNote').value.trim();
        const date   = document.getElementById('transferDate').value;

        if (!fromId || !toId) {
            showTopNotification('Please select both From and To accounts.', 'error'); return;
        }
        if (fromId === toId) {
            showTopNotification('Source and destination accounts must be different.', 'error'); return;
        }
        if (!amount || amount <= 0) {
            showTopNotification('Enter a valid amount.', 'error'); return;
        }

        const payload = {
            description: note || 'Transfer',
            amount: amount,
            category_id: null,
            transaction_type: 'transfer',
            date: date,
            sourceAccountId: parseInt(fromId, 10),
            destinationAccountId: parseInt(toId, 10)
        };

        try {
            const response = await fetch('/api/transactions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                document.getElementById('transferForm').reset();
                document.getElementById('transferDate').valueAsDate = new Date();
                showTopNotification('Transfer logged successfully.', 'success');
            } else {
                const err = await response.json().catch(() => null);
                showTopNotification((err && err.error) || 'Failed to log transfer.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to log transfer right now.', 'error');
        }
    });

    function showTopNotification(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `notification-toast notification-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }

    // ============== CATEGORY MANAGEMENT FUNCTIONS ==============
    async function loadCategoriesForManagement() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            cachedCategories = categories;

            const container = document.getElementById('categoriesListContainer');
            if (!categories.length) {
                container.innerHTML = '<p class="text-muted">No categories yet. Create one to get started!</p>';
                return;
            }

            container.innerHTML = categories.map(cat => `
                <div class="card mb-3" style="border-left: 5px solid ${cat.color}">
                    <div class="card-body py-3 d-flex justify-content-between align-items-center">
                        <div style="flex: 1;">
                            <h6 class="card-title mb-0" style="color: ${cat.color}; font-weight: bold;">
                                ${cat.name}
                            </h6>
                            <small class="text-muted">Color: ${cat.color}</small>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-sm btn-outline-primary" onclick="editCategory(${cat.id})" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${cat.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            showTopNotification('Unable to load categories.', 'error');
        }
    }

    function editCategory(id) {
        const current = cachedCategories.find(c => c.id === id);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }
        editCategoryId = id;
        document.getElementById('editCategoryName').value = current.name || '';
        document.getElementById('editCategoryColor').value = current.color || '#3498db';
        editCategoryModal.show();
    }

    async function saveCategoryChanges() {
        if (editCategoryId === null) return;
        const current = cachedCategories.find(c => c.id === editCategoryId);
        if (!current) {
            showTopNotification('Category not found.', 'error');
            return;
        }

        const newName = document.getElementById('editCategoryName').value.trim();
        const newColor = document.getElementById('editCategoryColor').value.trim() || '#3498db';
        if (!newName) {
            showTopNotification('Category name cannot be empty.', 'error');
            return;
        }

        try {
            const response = await fetch(`/api/categories/${editCategoryId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: newName,
                    color: newColor,
                    icon: current.icon || 'tag',
                    description: current.description || ''
                })
            });

            if (response.ok) {
                editCategoryModal.hide();
                editCategoryId = null;
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category updated successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error updating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to update category right now.', 'error');
        }
    }

    function deleteCategory(id) {
        deleteCategoryId = id;
        deleteCategoryModal.show();
    }

    async function confirmDeleteCategory() {
        if (deleteCategoryId === null) return;
        try {
            const response = await fetch(`/api/categories/${deleteCategoryId}`, {method: 'DELETE'});
            if (response.ok) {
                deleteCategoryModal.hide();
                deleteCategoryId = null;
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category deleted successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error deleting category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to delete category right now.', 'error');
        }
    }

    function openAddCategoryModal() {
        document.getElementById('newCategoryName').value = '';
        document.getElementById('newCategoryColor').value = '#3498db';
        // Pre-select type matching the current transaction type
        const currentType = document.getElementById('type').value || 'general';
        const typeEl = document.getElementById('newCategoryType');
        if (typeEl) typeEl.value = currentType;
        addCategoryModal.show();
    }

    async function createNewCategory() {
        const name  = document.getElementById('newCategoryName').value.trim();
        const color = document.getElementById('newCategoryColor').value;
        const catType = document.getElementById('newCategoryType').value || 'general';

        if (!name) {
            showTopNotification('Category name cannot be empty.', 'error');
            return;
        }

        const category = {
            name: name,
            color: color,
            icon: 'tag',
            categoryType: catType
        };

        try {
            const response = await fetch('/api/categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(category)
            });
            if (response.ok) {
                addCategoryModal.hide();
                loadCategoriesForManagement();
                loadCategories(document.getElementById('type').value);
                showTopNotification('Category created successfully.', 'success');
            } else {
                const errorData = await response.json().catch(() => null);
                showTopNotification(errorData?.error || 'Error creating category.', 'error');
            }
        } catch (error) {
            showTopNotification('Unable to create category right now.', 'error');
        }
    }
    async function loadAccountsIntoSelect() {
        try {
            const resp = await fetch('/api/accounts');
            if (!resp.ok) return;
            const accounts = await resp.json();
        const label = a => a.accountNickname + (a.bankName ? ' (' + a.bankName + ')' : a.provider ? ' (' + a.provider + ')' : '');
        const srcSel  = document.getElementById('sourceAccount');
        const fromSel = document.getElementById('transferFrom');
        const toSel   = document.getElementById('transferTo');
        const srcOpts = '<option value="">-- No account --</option>' + accounts.map(a => `<option value="${a.id}">${label(a)}</option>`).join('');
        const txOpts  = '<option value="">Select…</option>' + accounts.map(a => `<option value="${a.id}">${label(a)}</option>`).join('');
        if (srcSel)  srcSel.innerHTML  = srcOpts;
        if (fromSel) fromSel.innerHTML = txOpts;
        if (toSel)   toSel.innerHTML   = txOpts;
        } catch(e) { console.warn('Could not load accounts for select:', e); }
    }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
