<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .note-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            border-radius: 12px;
            padding: 16px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }

        .note-card.pinned::before {
            content: '📌';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.2rem;
        }

        .note-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .note-preview {
            font-size: 0.9rem;
            color: #666;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .note-footer {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: none;
            gap: 4px;
        }

        .note-card:hover .note-actions {
            display: flex;
        }

        .note-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .note-btn:hover {
            background: #fff;
            transform: scale(1.1);
        }

        .search-box {
            margin-bottom: 24px;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .filter-btn:hover {
            border-color: var(--accent-color);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        @media (max-width: 768px) {
            .notes-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="fas fa-note-sticky"></i> Notes</h2>
                <button class="btn btn-primary" onclick="openCreateNoteModal()">
                    <i class="fas fa-plus"></i> New Note
                </button>
            </div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchNotes" class="form-control" placeholder="Search notes by title or content..." onkeyup="searchNotes()">
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterNotes('all')">All</button>
        <button class="filter-btn" onclick="filterNotes('pinned')">📌 Pinned</button>
    </div>

    <div class="notes-grid" id="notesContainer">
        <div class="text-center text-muted py-5">
            <i class="fas fa-inbox" style="font-size: 3rem;"></i>
            <p class="mt-2">No notes yet. Create one to get started!</p>
        </div>
    </div>
</div>

<!-- Create/Edit Note Modal -->
<div class="modal fade" id="noteModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="noteModalTitle">New Note</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="noteTitle" placeholder="Enter note title">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Content</label>
                    <textarea class="form-control" id="noteContent" rows="8" placeholder="Write your note here..."></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Color</label>
                            <div class="d-flex gap-2">
                                <input type="color" class="form-control" id="noteColor" value="#FFE082" style="width: 50px;">
                                <input type="text" class="form-control" id="noteColorText" value="#FFE082" placeholder="#FFE082">
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tags</label>
                            <input type="text" class="form-control" id="noteTags" placeholder="e.g., important, work">
                        </div>
                    </div>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="notePinned">
                    <label class="form-check-label" for="notePinned">Pin this note</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveNote()">Save Note</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Note Confirmation Modal -->
<div class="modal fade" id="deleteNoteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Note</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Do you want to delete this note?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteNoteBtn">Yes, Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- User Profile Modal -->
<div class="modal fade" id="userProfileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user"></i> User Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-4">
                    <div class="position-relative d-inline-block">
                        <img src="https://via.placeholder.com/120" id="profilePicture" class="rounded-circle border" style="width: 120px; height: 120px; object-fit: cover;">
                        <button type="button" class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" title="Change Picture" style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-camera"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control" id="userName" value="User Name" placeholder="Enter your full name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" id="userEmail" value="user@example.com" placeholder="Enter your email">
                </div>
                <hr>
                <div class="mb-3">
                    <label class="form-label fw-bold">Change Password</label>
                    <input type="password" class="form-control mb-2" placeholder="Current Password">
                    <input type="password" class="form-control mb-2" placeholder="New Password">
                    <input type="password" class="form-control" placeholder="Confirm Password">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allNotes = [];
    let currentFilter = 'all';
    let editingNoteId = null;
    let deleteNoteId = null;
    let deleteNoteModal = null;

    document.addEventListener('DOMContentLoaded', function() {
        deleteNoteModal = new bootstrap.Modal(document.getElementById('deleteNoteModal'));
        document.getElementById('confirmDeleteNoteBtn').addEventListener('click', confirmDeleteNote);
        loadNotes();
    });

    async function loadNotes() {
        try {
            const response = await fetch('/api/notes');
            allNotes = await response.json();
            displayNotes(allNotes);
        } catch (error) {
            console.error('Error loading notes:', error);
        }
    }

    function displayNotes(notes) {
        const container = document.getElementById('notesContainer');
        if (notes.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center text-muted py-5">
                    <i class="fas fa-inbox" style="font-size: 3rem;"></i>
                    <p class="mt-2">No notes found.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = notes.map(note => `
            <div class="note-card" style="background-color: ${note.color};" onclick="editNote(${note.id})">
                <div class="note-actions">
                    <button class="note-btn" onclick="event.stopPropagation(); deleteNote(${note.id})" title="Delete">
                        <i class="fas fa-trash text-danger"></i>
                    </button>
                    <button class="note-btn" onclick="event.stopPropagation(); togglePin(${note.id}, ${note.pinned})" title="${note.pinned ? 'Unpin' : 'Pin'}">
                        <i class="fas fa-thumbtack ${note.pinned ? 'text-warning' : 'text-muted'}"></i>
                    </button>
                </div>
                <div class="note-title">${escapeHtml(note.title)}</div>
                <div class="note-preview">${escapeHtml(note.preview)}</div>
                <div class="note-footer">
                    <span>${new Date(note.updated_at).toLocaleDateString()}</span>
                </div>
            </div>
        `).join('');
    }

    function openCreateNoteModal() {
        editingNoteId = null;
        document.getElementById('noteModalTitle').textContent = 'New Note';
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        document.getElementById('noteColor').value = '#FFE082';
        document.getElementById('noteColorText').value = '#FFE082';
        document.getElementById('noteTags').value = '';
        document.getElementById('notePinned').checked = false;
        new bootstrap.Modal(document.getElementById('noteModal')).show();
    }

    async function editNote(id) {
        const note = allNotes.find(n => n.id === id);
        if (!note) return;

        editingNoteId = id;
        document.getElementById('noteModalTitle').textContent = 'Edit Note';
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content;
        document.getElementById('noteColor').value = note.color;
        document.getElementById('noteColorText').value = note.color;
        document.getElementById('noteTags').value = note.tags;
        document.getElementById('notePinned').checked = note.pinned;
        new bootstrap.Modal(document.getElementById('noteModal')).show();
    }

    async function saveNote() {
        const title = document.getElementById('noteTitle').value.trim();
        if (!title) {
            alert('Title is required');
            return;
        }

        const noteData = {
            title,
            content: document.getElementById('noteContent').value,
            color: document.getElementById('noteColor').value,
            tags: document.getElementById('noteTags').value,
            pinned: document.getElementById('notePinned').checked
        };

        try {
            const url = editingNoteId ? `/api/notes/${editingNoteId}` : '/api/notes';
            const method = editingNoteId ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(noteData)
            });

            if (response.ok) {
                showNotification(editingNoteId ? 'Note updated' : 'Note created', 'success');
                bootstrap.Modal.getInstance(document.getElementById('noteModal')).hide();
                loadNotes();
            } else {
                showNotification('Failed to save note', 'error');
            }
        } catch (error) {
            console.error('Error saving note:', error);
            showNotification('Error saving note', 'error');
        }
    }

    async function deleteNote(id) {
        deleteNoteId = id;
        deleteNoteModal.show();
    }

    async function confirmDeleteNote() {
        if (deleteNoteId === null) return;
        try {
            const response = await fetch(`/api/notes/${deleteNoteId}`, { method: 'DELETE' });
            if (response.ok) {
                deleteNoteModal.hide();
                deleteNoteId = null;
                showNotification('Note deleted', 'success');
                loadNotes();
            } else {
                showNotification('Failed to delete note', 'error');
            }
        } catch (error) {
            console.error('Error deleting note:', error);
            showNotification('Error deleting note', 'error');
        }
    }

    async function togglePin(id, isPinned) {
        const note = allNotes.find(n => n.id === id);
        if (!note) return;

        try {
            const response = await fetch(`/api/notes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...note, pinned: !isPinned })
            });

            if (response.ok) {
                loadNotes();
            }
        } catch (error) {
            console.error('Error toggling pin:', error);
        }
    }

    function searchNotes() {
        const search = document.getElementById('searchNotes').value;
        if (!search) {
            filterNotes(currentFilter);
            return;
        }

        const filtered = allNotes.filter(note =>
            note.title.toLowerCase().includes(search.toLowerCase()) ||
            note.content.toLowerCase().includes(search.toLowerCase())
        );
        displayNotes(filtered);
    }

    function filterNotes(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        let filtered = allNotes;
        if (filter === 'pinned') {
            filtered = allNotes.filter(n => n.pinned);
        }
        displayNotes(filtered);
    }

    function showNotification(message, type = 'success') {
        const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
        const alertHTML = `
            <div class="alert ${alertClass} alert-dismissible fade show" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 300px;">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        const div = document.createElement('div');
        div.innerHTML = alertHTML;
        document.body.appendChild(div.firstElementChild);

        setTimeout(() => {
            div.firstElementChild?.remove();
        }, 5000);
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
    }
</script>
<script src="/js/sidebar.js"></script>
</body>
</html>
