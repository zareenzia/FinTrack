<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #18230F 0%, #1f2f17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1F7D53, #255F38);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-header i {
            font-size: 2.5rem;
            color: #255F38;
            margin-right: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #18230F;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            background-color: #f8f9f8;
        }

        .form-control:focus {
            border-color: #255F38;
            background-color: #ffffff;
            box-shadow: 0 0 0 0.3rem rgba(37, 95, 56, 0.15);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, #255F38 0%, #1F7D53 100%);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 95, 56, 0.3);
            color: white;
        }

        .signup-section {
            background: linear-gradient(135deg, rgba(31, 125, 83, 0.1) 0%, rgba(37, 95, 56, 0.1) 100%);
            border: 2px dashed #1F7D53;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .signup-section h3 {
            color: #18230F;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .signup-section p {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .signup-section p strong {
            color: #1F7D53;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #1F7D53 0%, #0B5E3F 100%);
            color: white;
            font-weight: 700;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(31, 125, 83, 0.4);
            color: white;
            text-decoration: none;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            font-size: 0.9rem;
            color: #999;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
            z-index: 0;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .error-message {
            background: #fee;
            border-left: 4px solid #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #c0392b;
            display: none;
            font-weight: 500;
        }

        .success-message {
            background: #eef;
            border-left: 4px solid #1F7D53;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1F7D53;
            display: none;
            font-weight: 500;
        }

        .loading {
            display: none;
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .signup-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <!-- Login Section -->
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-wallet"></i> FinTrack</h1>
            <p>Manage your finances with ease</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username or Email</label>
                <input type="text" class="form-control" id="usernameOrEmail" placeholder="Enter your username or email" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>
    </div>

    <!-- Signup CTA Section -->
    <div class="signup-section">
        <h3><i class="fas fa-user-plus"></i> New to FinTrack?</h3>
        <p>Create a free account and start managing your finances today. <strong>It takes just 2 minutes!</strong></p>
        <a href="/signup" class="btn-signup">
            <i class="fas fa-arrow-right"></i> Create Account
        </a>
        <div class="divider"><span>or</span></div>
        <p style="font-size: 0.85rem; margin: 0; color: #999;">Already have an account? Use the form above to login</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const usernameOrEmail = document.getElementById('usernameOrEmail').value.trim();
        const password = document.getElementById('password').value;
        
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (!usernameOrEmail || !password) {
            errorDiv.textContent = 'Please fill in all fields';
            errorDiv.style.display = 'block';
            return;
        }
        
        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    usernameOrEmail: usernameOrEmail,
                    password: password
                })
            });
            
            let data = {};
            let responseText = '';
            
            try {
                responseText = await response.text();
                if (responseText) {
                    data = JSON.parse(responseText);
                }
            } catch (parseError) {
                console.error('Error parsing response:', parseError);
                console.log('Response text:', responseText);
            }
            
            if (response.ok && (response.status === 200 || response.status === 201)) {
                console.log('Login successful:', data);
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    console.log('Token saved to localStorage');
                }
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                }
                successDiv.innerHTML = '✅ Login successful! <strong>Redirecting to dashboard...</strong>';
                successDiv.style.display = 'block';
                
                // Redirect to dashboard.html (static file that doesn't require server-side auth)
                console.log('Redirecting to dashboard.html in 500ms...');
                setTimeout(() => {
                    console.log('Executing redirect...');
                    window.location.href = '/dashboard.html';
                }, 500);
            } else {
                const errorMsg = data.error || 'Login failed. Please try again.';
                console.error('Login error:', response.status, errorMsg);
                errorDiv.textContent = errorMsg;
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Network error:', error);
            errorDiv.textContent = 'Connection error. Please try again.';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
