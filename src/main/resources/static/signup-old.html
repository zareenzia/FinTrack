<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #18230F 0%, #1f2f17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1F7D53, #255F38);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .signup-header i {
            font-size: 2.5rem;
            color: #255F38;
            margin-right: 10px;
        }

        .signup-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #18230F;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            background-color: #f8f9f8;
        }

        .form-control:focus {
            border-color: #255F38;
            background-color: #ffffff;
            box-shadow: 0 0 0 0.3rem rgba(37, 95, 56, 0.15);
            outline: none;
        }

        .form-control.is-invalid {
            border-color: #e74c3c;
        }

        .validation-text {
            font-size: 0.85rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .validation-text.valid {
            color: #1F7D53;
        }

        .validation-text.invalid {
            color: #e74c3c;
        }

        .validation-check {
            font-size: 0.75rem;
        }

        .btn-signup {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, #255F38 0%, #1F7D53 100%);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .btn-signup:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 95, 56, 0.3);
            color: white;
        }

        .btn-signup:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signup-footer {
            text-align: center;
            margin-top: 24px;
            border-top: 1px solid #e0e0e0;
            padding-top: 24px;
        }

        .signup-footer p {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        .signup-footer a {
            color: #255F38;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-footer a:hover {
            color: #1F7D53;
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            border-left: 4px solid #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #c0392b;
            display: none;
            font-weight: 500;
        }

        .success-message {
            background: #eef;
            border-left: 4px solid #1F7D53;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1F7D53;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="signup-container">
    <div class="signup-header">
        <h1><i class="fas fa-wallet"></i> FinTrack</h1>
        <p>Create your account</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="signupForm">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="3-30 characters (letters, numbers, _, .)" required>
            <div id="usernameValidation" class="validation-text invalid">
                <i class="fas fa-times-circle validation-check"></i>
                <span>3-30 characters, alphanumeric, underscore, period only</span>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            <div id="emailValidation" class="validation-text invalid">
                <i class="fas fa-times-circle validation-check"></i>
                <span>Valid email format required</span>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min 8 chars, 1 upper, 1 lower, 1 digit, 1 special" required>
            <div id="passwordValidation" class="validation-text invalid">
                <i class="fas fa-times-circle validation-check"></i>
                <span>Must contain: 8+ chars, uppercase, lowercase, number, special character</span>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
            <div id="confirmValidation" class="validation-text invalid">
                <i class="fas fa-times-circle validation-check"></i>
                <span>Passwords must match</span>
            </div>
        </div>

        <button type="submit" class="btn btn-signup" disabled>
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="signup-footer">
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const fullName = document.getElementById('fullName');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const signupBtn = document.querySelector('.btn-signup');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');

    const validators = {
        username: (val) => {
            return /^[a-zA-Z0-9_.]{3,30}$/.test(val);
        },
        email: (val) => {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
        },
        password: (val) => {
            return val.length >= 8 && 
                   /[A-Z]/.test(val) && 
                   /[a-z]/.test(val) && 
                   /[0-9]/.test(val) && 
                   /[!@#$%^&*]/.test(val);
        },
        confirm: (pwd, confirm) => {
            return pwd === confirm && pwd.length > 0;
        }
    };

    function validateField(field) {
        const id = field.id;
        let valid = false;

        if (id === 'username') {
            valid = validators.username(field.value);
            updateValidation('usernameValidation', valid);
        } else if (id === 'email') {
            valid = validators.email(field.value);
            updateValidation('emailValidation', valid);
        } else if (id === 'password') {
            valid = validators.password(field.value);
            updateValidation('passwordValidation', valid);
        } else if (id === 'confirmPassword') {
            valid = validators.confirm(password.value, field.value);
            updateValidation('confirmValidation', valid);
        }

        field.classList.toggle('is-invalid', !valid && field.value.length > 0);
        return valid;
    }

    function updateValidation(elementId, valid) {
        const elem = document.getElementById(elementId);
        if (valid) {
            elem.classList.remove('invalid');
            elem.classList.add('valid');
            elem.querySelector('i').classList.remove('fa-times-circle');
            elem.querySelector('i').classList.add('fa-check-circle');
        } else {
            elem.classList.remove('valid');
            elem.classList.add('invalid');
            elem.querySelector('i').classList.remove('fa-check-circle');
            elem.querySelector('i').classList.add('fa-times-circle');
        }
    }

    function checkFormValidity() {
        const isValid = fullName.value.trim().length > 0 &&
                       validators.username(username.value) &&
                       validators.email(email.value) &&
                       validators.password(password.value) &&
                       validators.confirm(password.value, confirmPassword.value);
        signupBtn.disabled = !isValid;
    }

    username.addEventListener('input', (e) => { validateField(e.target); checkFormValidity(); });
    email.addEventListener('input', (e) => { validateField(e.target); checkFormValidity(); });
    password.addEventListener('input', (e) => { validateField(e.target); checkFormValidity(); });
    confirmPassword.addEventListener('input', (e) => { validateField(e.target); checkFormValidity(); });
    fullName.addEventListener('input', checkFormValidity);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!validateField(username) || !validateField(email) || !validateField(password) || !validateField(confirmPassword)) {
            errorDiv.textContent = 'Please fix the validation errors above';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fullName: fullName.value.trim(),
                    username: username.value.trim(),
                    email: email.value.trim(),
                    password: password.value,
                    confirmPassword: confirmPassword.value
                })
            });

            let data = {};
            let responseText = '';
            
            try {
                responseText = await response.text();
                if (responseText) {
                    data = JSON.parse(responseText);
                }
            } catch (parseError) {
                console.error('Error parsing response:', parseError);
                console.log('Response text:', responseText);
            }

            if (response.ok && (response.status === 201 || response.status === 200)) {
                console.log('Registration successful:', data);
                if (data.token) {
                    localStorage.setItem('token', data.token);
                }
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                }
                successDiv.textContent = '✅ Registration successful! Redirecting to login...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } else {
                const errorMsg = data.error || 'Registration failed. Please try again.';
                console.error('Registration error:', response.status, errorMsg);
                errorDiv.textContent = errorMsg;
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Network error:', error);
            errorDiv.textContent = 'Connection error. Please try again.';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
